<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Linberg Analytics — Coming Soon</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 20px;
            overflow-x: hidden;
            color: white;
            font-family: "Inter", sans-serif;
            background:
                radial-gradient(circle at 50% 25%, rgba(14, 165, 233, 0.16), transparent 38%),
                linear-gradient(145deg, #07111f, #0f1d32 55%, #081424);
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: #0ea5e9;
            filter: blur(200px);
            opacity: 0.12;
            pointer-events: none;
            animation: drift 10s ease-in-out infinite;
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(950px, 100%);
            text-align: center;
        }

        .logo-wrap {
            width: min(610px, 92vw);
            margin: 0 auto 24px;
            padding: 18px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.4),
                0 0 55px rgba(56, 189, 248, 0.14);
            animation: fadeUp 1s ease both;
        }

        .logo-wrap img {
            display: block;
            width: 100%;
            height: auto;
        }

        h1 {
            margin-top: 12px;
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1.05;
            letter-spacing: 0.14em;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 18px;
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: #9cc9e8;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            margin-top: 30px;
            padding: 12px 25px;
            border: 1px solid rgba(56, 189, 248, 0.8);
            border-radius: 999px;
            color: #38bdf8;
            background: rgba(14, 165, 233, 0.08);
            font-weight: 600;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.1);
        }

        .tagline {
            max-width: 800px;
            margin: 30px auto 0;
            font-size: clamp(1rem, 2vw, 1.15rem);
            line-height: 1.9;
            color: #d8e3ef;
        }

        .services {
            margin-top: 16px;
            color: #89a9c2;
        }

        footer {
            margin-top: 42px;
            color: #607b94;
            font-size: 0.9rem;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes drift {
            0%, 100% {
                transform: translate(-150px, -80px);
            }

            50% {
                transform: translate(150px, 70px);
            }
        }

        @media (max-width: 600px) {
            body {
                align-items: flex-start;
                padding-top: 42px;
            }

            .logo-wrap {
                padding: 10px;
                border-radius: 20px;
            }

            h1 {
                letter-spacing: 0.08em;
            }

            footer {
                margin-top: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="glow"></div>

    <main class="container">
        <div class="logo-wrap">
            <img src="logo.png" alt="Linberg Analytics LLC logo">
        </div>

        <h1>LINBERG ANALYTICS</h1>

        <p class="subtitle">
            Transforming Data into Decisions
        </p>

        <div class="badge">
            🚀 Coming Soon
        </div>

        <p class="tagline">
            Building intelligent software powered by artificial intelligence,
            analytics, automation, and decision support.
        </p>

        <p class="services">
            AI Solutions • Business Intelligence • Custom Software • Automation
        </p>

        <footer>
            © 2026 Linberg Analytics LLC
        </footer>
    </main>
</body>
</html>

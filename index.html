<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linberg Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

height:100vh;

background:
radial-gradient(circle at top,#1f2937,#0f172a 70%);

display:flex;

justify-content:center;

align-items:center;

color:white;

overflow:hidden;

}

.container{

text-align:center;

max-width:900px;

padding:40px;

}

.logo{

font-size:4rem;

font-weight:700;

letter-spacing:2px;

margin-bottom:15px;

}

.subtitle{

font-size:1.3rem;

color:#94a3b8;

margin-bottom:50px;

}

.tagline{

font-size:1.1rem;

line-height:1.8;

color:#d1d5db;

margin-bottom:45px;

}

.badge{

display:inline-block;

padding:12px 28px;

border:1px solid #38bdf8;

border-radius:999px;

color:#38bdf8;

margin-bottom:40px;

font-weight:600;

}

.footer{

color:#64748b;

margin-top:60px;

font-size:.9rem;

}

.glow{

position:absolute;

width:500px;

height:500px;

background:#0ea5e9;

filter:blur(180px);

opacity:.18;

animation:float 8s ease-in-out infinite;

}

@keyframes float{

0%{transform:translate(-100px,-40px);}
50%{transform:translate(100px,60px);}
100%{transform:translate(-100px,-40px);}

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="logo">

LINBERG ANALYTICS

</div>

<div class="subtitle">

Transforming Data into Decisions

</div>

<div class="badge">

🚀 Launching Soon

</div>

<div class="tagline">

Building intelligent software powered by<br><br>

Artificial Intelligence • Analytics • Automation • Decision Support

</div>

<div class="footer">

© 2026 Linberg Analytics

</div>

</div>

</body>

</html>
